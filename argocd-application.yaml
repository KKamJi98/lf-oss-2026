apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lf-oss-na-2026
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KKamJi98/lf-oss-2026.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: lf-oss-na-2026
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
